AWSTemplateFormatVersion: 2010-09-09
# Two transforms:
# - LanguageExtensions enables Fn::ForEach (looping over resources) and Fn::ToJsonString
# - Serverless (SAM) enables shorthand like AWS::Serverless::Function
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31
Description: Contender Lambda functions competing in the demo-s3-archiving benchmark

Parameters:
  ProjectName:
    Type: String
  BucketName:
    Type: String
    Description: The name of the bucket containing the test objects for benching archive creation
  FilesPrefix:
    Type: String
    Default: files
    Description: Key prefix under which the test objects live in the bucket

Resources:
  LambdaContenderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-lambda-contender
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: s3-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Sid: GetObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${BucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${BucketName}/${FilesPrefix}/*
              - Sid: UploadArchive
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                  - s3:ListMultipartUploadParts
                  - s3:ListBucketMultipartUploads
                Resource: !Sub arn:${AWS::Partition}:s3:::${BucketName}/archives/*
              # ---------------------------------------------------------------
              # ChainIntermediates — required ONLY by the figment-engine-chain
              # contender. Its copy-only design builds intermediate segment/link
              # objects under the dedicated seg-temps/ prefix (NOT archives/), then
              # uses UploadPartCopy with THOSE objects as the copy source (each
              # forward link copies the previous link's object). That needs full
              # MPU write perms AND s3:GetObject on seg-temps/* as the copy source —
              # none of which the UploadArchive statement (scoped to archives/*)
              # grants. The intermediates are reaped by a bucket lifecycle rule
              # (Prefix: seg-temps/), so the chain does NOT need DeleteObject.
              # Scoped to seg-temps/* so it cannot touch source objects or archives.
              - Sid: ChainIntermediates
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:AbortMultipartUpload
                  - s3:ListMultipartUploadParts
                Resource: !Sub arn:${AWS::Partition}:s3:::${BucketName}/seg-temps/*
              # ---------------------------------------------------------------
              # Execute — required by the jrodon-v3 contender, which re-invokes
              # itself hundreds of times (sub-workers) to break the single-Lambda
              # bandwidth ceiling. Scoped to this project's functions.
              - Sid: Execute
                Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-*
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
      Path: /
  # =============================================================================
  # CONTENDERS — REGISTER YOUR LAMBDA HERE
  # =============================================================================
  # To add a contender, append two resources to this section, following the
  # naming and structural conventions described below.
  #
  # Naming convention (STRICT — the benching Step Function relies on it):
  #
  #   - FunctionName MUST be: !Sub ${ProjectName}-<lang>-<dev_id>
  #       e.g. ${ProjectName}-rust-jrodon
  #
  #   - <lang>-<dev_id> SHOULD match the source directory:
  #       contenders/<lang>/<dev_id>/
  #
  #   - CloudFormation logical IDs (the keys below) SHOULD be PascalCase'd:
  #       <Lang><DevId>Function
  #       <Lang><DevId>FunctionLogGroup
  #
  #   - For Rust contenders, the Cargo package name in
  #     contenders/<lang>/<dev_id>/Cargo.toml MUST equal <dev_id>
  #     (the CI buildspec uses it to locate `target/lambda/<dev_id>/bootstrap`).
  #
  # The Step Function bench input takes a list of contender ARNs. The state
  # machine derives the per-contender archive name by stripping the
  # `${ProjectName}-` prefix from the function name, so it ends up
  # writing/reading `archives/<lang>-<dev_id>.zip` in the bucket.
  #
  # All contenders share the same IAM role (LambdaContenderRole above), so
  # adding one only requires defining the Function + its LogGroup.
  # =============================================================================

  # ----------------------------- BEGIN CONTENDERS -------------------------------
  #
  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                  >>> INSERT YOUR CONTENDER HERE <<<                      ║
  # ║                                                                          ║
  # ║  Copy the RustJrodon block below as a template and adjust:               ║
  # ║    - logical IDs (PascalCase: <Lang><DevId>Function / ...LogGroup)       ║
  # ║    - FunctionName  (must be ${ProjectName}-<lang>-<dev_id>)              ║
  # ║    - CodeUri       (../contenders/<lang>/<dev_id>)                       ║
  # ║    - Runtime / Handler (see cheat sheet below)                           ║
  # ║                                                                          ║
  # ║  Common runtime + handler values:                                        ║
  # ║    Rust   (custom):  Runtime: provided.al2023,  Handler: rust.handler    ║
  # ║                      (Handler is ignored — bootstrap is executed)        ║
  # ║    Go     (custom):  Runtime: provided.al2023,  Handler: bootstrap       ║
  # ║                      (Handler is ignored — bootstrap is executed)        ║
  # ║    Swift  (custom):  Runtime: provided.al2023,  Handler: swift.handler   ║
  # ║                      (Handler is ignored — bootstrap is executed)        ║
  # ║    Python 3.x:       Runtime: python3.x,        Handler: index.handler   ║
  # ║    Node.js 22.x:     Runtime: nodejs22.x,       Handler: index.handler   ║
  # ║    Java 21:          Runtime: java21,           Handler: pkg.Cls::method ║
  # ║                                                                          ║
  # ║  Non-Rust compiled languages also require a build step in                ║
  # ║  ci-config/buildspec.yml — see the README "Buildspec adjustments"        ║
  # ║  section.                                                                ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  #
  # The reference Rust contender below is both a working example AND the
  # copy-paste template for new contenders. Keep it as the last block in
  # this section so newcomers always see a valid registered Lambda.

  # Rust / jrodon  (reference implementation)
  RustJrodonFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rust-jrodon
      Description: Full streaming of the archive
      CodeUri: ../contenders/rust/jrodon
      # provided.al2023 is the custom runtime for compiled binaries (Rust, Go, C++).
      # The Lambda service executes the `bootstrap` binary directly.
      Runtime: provided.al2023
      MemorySize: 512 # 512MB is likely the minimum allowing to get enough CPU to unlock the full 600Mbps network bandwidth with ARM64 Rust lambda
      Timeout: 600
      # For custom runtimes, Handler is technically ignored (bootstrap is always executed).
      # This value is just my convention.
      Handler: rust.handler
      Architectures:
        # ARM64 (Graviton2): ~20% cheaper and often faster than x86_64 for Rust Lambda workloads
        - arm64
      Environment:
        Variables:
          # RUST_LOG configures the `tracing` crate's log filter:
          # debug for app code, info for noisy AWS SDK internals
          RUST_LOG: info # debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info
      Role: !GetAtt LambdaContenderRole.Arn
  RustJrodonFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RustJrodonFunction}
      RetentionInDays: 90

  # Rust / jrodon  (reference implementation)
  RustJrodonV2Function:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rust-jrodon-v2
      Description: Uses UploadPartCopy to avoid streaming half the archive
      CodeUri: ../contenders/rust/jrodon-v2
      # provided.al2023 is the custom runtime for compiled binaries (Rust, Go, C++).
      # The Lambda service executes the `bootstrap` binary directly.
      Runtime: provided.al2023
      MemorySize: 512 # 512MB is likely the minimum allowing to get enough CPU to unlock the full 600Mbps network bandwidth with ARM64 Rust lambda
      Timeout: 600
      # For custom runtimes, Handler is technically ignored (bootstrap is always executed).
      # This value is just my convention.
      Handler: rust.handler
      Architectures:
        # ARM64 (Graviton2): ~20% cheaper and often faster than x86_64 for Rust Lambda workloads
        - arm64
      Environment:
        Variables:
          # RUST_LOG configures the `tracing` crate's log filter:
          # debug for app code, info for noisy AWS SDK internals
          RUST_LOG: info # debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info
      Role: !GetAtt LambdaContenderRole.Arn
  RustJrodonV2FunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RustJrodonV2Function}
      RetentionInDays: 90

  RustJrodonV3Function:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rust-jrodon-v3
      Description: Based on v2 design but invoke itself hundreds of times to break off single lambda bandwidth limit
      CodeUri: ../contenders/rust/jrodon-v3
      # provided.al2023 is the custom runtime for compiled binaries (Rust, Go, C++).
      # The Lambda service executes the `bootstrap` binary directly.
      Runtime: provided.al2023
      MemorySize: 512 # 512MB is likely the minimum allowing to get enough CPU to unlock the full 600Mbps network bandwidth with ARM64 Rust lambda
      Timeout: 600
      # For custom runtimes, Handler is technically ignored (bootstrap is always executed).
      # This value is just my convention.
      Handler: rust.handler
      Architectures:
        # ARM64 (Graviton2): ~20% cheaper and often faster than x86_64 for Rust Lambda workloads
        - arm64
      Environment:
        Variables:
          # RUST_LOG configures the `tracing` crate's log filter:
          # debug for app code, info for noisy AWS SDK internals
          RUST_LOG: info # debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info
          MAX_LAMBDA_WORKERS: 150
      Role: !GetAtt LambdaContenderRole.Arn
  RustJrodonV3FunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RustJrodonV3Function}
      RetentionInDays: 90

  # Rust / figment-engine  (optimised reference implementation)
  RustFigmentEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rust-figment-engine
      CodeUri: ../contenders/rust/figment-engine
      # provided.al2023 is the custom runtime for compiled binaries (Rust, Go, C++).
      # The Lambda service executes the `bootstrap` binary directly.
      Runtime: provided.al2023
      MemorySize: 640
      Timeout: 600
      # For custom runtimes, Handler is technically ignored (bootstrap is always executed).
      # This value is just my convention.
      Handler: rust.handler
      Architectures:
        # ARM64 (Graviton2): ~20% cheaper and often faster than x86_64 for Rust Lambda workloads
        - arm64
      Environment:
        Variables:
          # RUST_LOG configures the `tracing` crate's log filter:
          # debug for app code, info for noisy AWS SDK internals
          RUST_LOG: info # debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info
      Role: !GetAtt LambdaContenderRole.Arn
  RustFigmentEngineFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RustFigmentEngineFunction}
      RetentionInDays: 90

  # Rust / figment-engine-less-clone  (optimised reference implementation)
  RustFigmentEngineLessCloneFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rust-figment-engine-less-clone
      CodeUri: ../contenders/rust/figment-engine-less-clone
      # provided.al2023 is the custom runtime for compiled binaries (Rust, Go, C++).
      # The Lambda service executes the `bootstrap` binary directly.
      Runtime: provided.al2023
      MemorySize: 640
      Timeout: 600
      # For custom runtimes, Handler is technically ignored (bootstrap is always executed).
      # This value is just my convention.
      Handler: rust.handler
      Architectures:
        # ARM64 (Graviton2): ~20% cheaper and often faster than x86_64 for Rust Lambda workloads
        - arm64
      Environment:
        Variables:
          # RUST_LOG configures the `tracing` crate's log filter:
          # debug for app code, info for noisy AWS SDK internals
          RUST_LOG: info # debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info
      Role: !GetAtt LambdaContenderRole.Arn
  RustFigmentEngineLessCloneFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RustFigmentEngineLessCloneFunction}
      RetentionInDays: 90

  # Rust / figment-engine-chain  (copy-only segment-chain — speed entry)
  # Every image body reaches the archive by server-side UploadPartCopy (bar one
  # 5 MiB bootstrap read), so it escapes the ENI bandwidth floor and is bound only
  # by S3 control-plane call rate. An adaptive AIAD governor (additive-increase /
  # additive-decrease, windowed) paces the ~22k calls under the S3 503 knee; solo
  # it never throttles. Each invocation is run alone by the harness (sequential
  # repeats), which is the only condition any contender is designed for.
  #
  # Memory is a vCPU dial, NOT a RAM need — the design does no real compute (no
  # compression, no body buffers, CRCs come from HEAD metadata), so peak RAM is
  # ~60-75 MB at every tier. vCPU drives the 256-wide async concurrency; build
  # throughput scales near-linearly with memory until it meets the serial-chain
  # latency floor (~10.5 s build / ~11 s total). Solo memory sweep (total duration):
  #    256 MB -> 65 s    vCPU-starved: reactor can't drive the concurrency
  #    512 MB -> 31 s
  #    768 MB -> 20 s    run_price (memory x duration) minimum
  #   1024 MB -> 17 s
  #   1536 MB -> 12 s    build ~11.1 s, ~0.5 s above floor
  #   1792 MB -> 11 s    build ~10.5 s  <-- lowest memory at the latency floor
  #   2048 MB -> 11 s    build ~10.5 s, no gain over 1792
  #   4096 MB -> 11 s    no gain; pure waste
  # 1792 MB is the SPEED choice: the lowest memory that reaches the ~10.5 s build
  # floor, so no vCPU is paid for above what cuts duration. (768 MB is the cheaper
  # run_price if cost is the priority; this entry optimises for speed.)
  # Needs the ChainIntermediates IAM statement (GetObject copy-source + MPU writes
  # on seg-temps/*); intermediates are reaped by the seg-temps/ lifecycle rule, so
  # no DeleteObject is required.
  RustFigmentEngineChainFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rust-figment-engine-chain
      CodeUri: ../contenders/rust/figment-engine-chain
      Runtime: provided.al2023
      MemorySize: 1792
      Timeout: 600
      Handler: rust.handler
      Architectures:
        - arm64
      Environment:
        Variables:
          RUST_LOG: info
      Role: !GetAtt LambdaContenderRole.Arn
  RustFigmentEngineChainFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RustFigmentEngineChainFunction}
      RetentionInDays: 90

  # ------------------------------ END CONTENDERS --------------------------------

# Outputs — the list of contender ARNs is consumed by the benching Step Function
# (root-template wires this up). Append a `!GetAtt` for every contender you
# register above, between the BEGIN/END markers.
Outputs:
  ContenderArns:
    Description: Event for the benching State Machine that can be passed as-is
    Value:
      Fn::ToJsonString:
        contenders:
          # ----- BEGIN CONTENDER ARN LIST -----
          # >>> INSERT YOUR CONTENDER ARN HERE <<<
          # Append one line per contender, mirroring the resource block you added above:
          #   - !GetAtt <Lang><DevId>Function.Arn
          - !GetAtt RustJrodonV2Function.Arn
          - !GetAtt RustFigmentEngineFunction.Arn
          - !GetAtt RustFigmentEngineLessCloneFunction.Arn
          # COMMENTED OUT BECAUSE IT CAUSES S3 SlowDown errors
          # You can still test it but it is advised to reduce the RunsPerContender parameter to 1 or 2
          # - !GetAtt RustJrodonV3Function.Arn
          # - !GetAtt RustFigmentEngineChainFunction.Arn
          # ----- END CONTENDER ARN LIST -----
