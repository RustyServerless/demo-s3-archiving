version: 0.2

# CodeBuild buildspec for the demo-s3-archiving project.
#
# The build:
#   1. Compiles every Rust Lambda crate to a static ARM64 binary.
#   2. Installs dependencies for every Python contender Lambda (if any).
#   3. Runs `aws cloudformation package` on every template, replacing local
#      `CodeUri` / `DefinitionUri` references by S3 URLs.
#
# Contender layout (see README for the contribution flow):
#   contenders/
#     rust/<dev_id>/        # one Cargo crate per Rust contender — crate name MUST be <dev_id>
#     python/<dev_id>/      # one folder per Python contender, may contain requirements.txt
#     <lang>/<dev_id>/      # add new language sub-directories here
#
# Internal Lambdas (Rust only): benching/fill-bucket and benching/control-lambda.
#
# ─────────────────────────────────────────────────────────────────────────────
# ADDING A NEW LANGUAGE
# ─────────────────────────────────────────────────────────────────────────────
# Rust and Python contenders are already handled. For any other language
# you MUST insert build steps in the `build` phase below. The pattern is:
#
#   1. Iterate over `contenders/<your-lang>/*` directories.
#   2. Compile / package each contender in place. The end state must be that
#      the `contenders/<your-lang>/<dev_id>/` directory contains ONLY the files
#      the Lambda runtime expects to find (e.g. `bootstrap` for custom
#      runtimes, a fat JAR for Java, …).
#   3. `aws cloudformation package` (in `post_build`) will zip that directory
#      verbatim and upload it to S3.
#
# A commented-out Go example is provided under the `# GO BUILD` marker below.
# ─────────────────────────────────────────────────────────────────────────────

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo Entered the install phase on `date`
      - |
        echo Installing Rust
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --profile minimal
        rustup show
        export PATH="/root/.cargo/bin:$PATH"
        pip3 install cargo-lambda
      - |
        ##############################################################
        # Swift 6.3.2 toolchain.                                     #
        # Adapted from the official Amazon Linux 2023 Dockerfile:    #
        # https://github.com/swiftlang/swift-docker/blob/main/6.3/   #
        #         amazonlinux/2023/Dockerfile                        #
        # CodeBuild already runs on AL2023 aarch64 = same OS/arch    #
        # as the Lambda runtime, so a native release build is what   #
        # we need; we'll bundle the Swift runtime libs alongside the #
        # binary in the build phase so Lambda doesn't need them.     #
        ##############################################################
        if ! command -v swift >/dev/null 2>&1; then
          echo Installing Swift toolchain
          dnf -y install \
            binutils gcc git unzip glibc-static gzip libbsd \
            libcurl-devel libedit libicu libstdc++-static libuuid \
            libxml2-devel openssl-devel tar tzdata
          dnf -y swap gnupg2-minimal gnupg2-full
          SWIFT_VERSION=swift-6.3.2-RELEASE
          SWIFT_BRANCH=swift-6.3.2-release
          SWIFT_PLATFORM=amazonlinux2023
          SWIFT_ARCH_SUFFIX=-aarch64
          SWIFT_BIN_URL="https://download.swift.org/${SWIFT_BRANCH}/${SWIFT_PLATFORM}${SWIFT_ARCH_SUFFIX}/${SWIFT_VERSION}/${SWIFT_VERSION}-${SWIFT_PLATFORM}${SWIFT_ARCH_SUFFIX}.tar.gz"
          SWIFT_SIG_URL="${SWIFT_BIN_URL}.sig"
          # GPG fingerprint of the official Swift 6.x release signing key
          # (https://swift.org/keys/all-keys.asc). Public; not a secret.
          SWIFT_GPG_FINGERPRINT=52BB7E3DE28A71BE22EC05FFEF80A866B47A981F
          # Cache the Swift toolchain tarball under $CODEBUILD_SRC_DIR so the
          # CodeBuild S3 cache can persist it across runs (~85 MB, saves ~30 s
          # of download per build). Re-download only when the version differs.
          mkdir -p ./.swift-cache
          if [ ! -f "./.swift-cache/${SWIFT_VERSION}.tar.gz" ]; then
            echo "Downloading $SWIFT_VERSION (cache miss)"
            export GNUPGHOME="$(mktemp -d)"
            curl -fsSL "$SWIFT_BIN_URL" -o ./.swift-cache/${SWIFT_VERSION}.tar.gz
            curl -fsSL "$SWIFT_SIG_URL" -o ./.swift-cache/${SWIFT_VERSION}.tar.gz.sig
            gpg --batch --quiet --keyserver keyserver.ubuntu.com --recv-keys "$SWIFT_GPG_FINGERPRINT"
            gpg --batch --verify ./.swift-cache/${SWIFT_VERSION}.tar.gz.sig ./.swift-cache/${SWIFT_VERSION}.tar.gz
            rm -rf "$GNUPGHOME" ./.swift-cache/${SWIFT_VERSION}.tar.gz.sig
            unset GNUPGHOME
          else
            echo "Using cached $SWIFT_VERSION tarball"
          fi
          tar -xzf ./.swift-cache/${SWIFT_VERSION}.tar.gz --directory / --strip-components=1
          chmod -R o+r /usr/lib/swift
        fi
        swift --version
    finally:
      - |
        echo Changing all file times to 2010-01-01 00:00:00 \(arbitrary\) to avoid inducing changes in ZIP packages
        find . -not -path '*/.git/*' -exec touch -a -m -t"201001010000.00" {} \;
      - echo Exiting the install phase on `date`
  pre_build:
    on-failure: ABORT
    commands:
      - echo Entered the pre_build phase on `date`
      ######################################################################################
      #                                 RUST PRE-BUILD                                     #
      # This is caching/cleanup logic for Rust, which has a notoriously long build time... #
      ######################################################################################
      - |
        RUST_INTERNAL_LAMBDA_PATH=./benching
        RUST_CONTENDER_LAMBDA_PATH=./contenders/rust
      - |
        current_build_rust_version=$(cargo --version 2>/dev/null)
        echo "Rust version: $current_build_rust_version"
        if ! previous_build_rust_version=$(cat previous_build_rust_version 2>/dev/null) || [ "$previous_build_rust_version" != "$current_build_rust_version" ]; then
          echo "Rust version changed $previous_build_rust_version -> $current_build_rust_version, cleaning everything"
          cargo clean --locked
          echo "$current_build_rust_version" > previous_build_rust_version
        fi
      - |
        ##########################
        #    Bash Hash Tables    #
        ##########################
        declare -A PACKAGES_TO_CLEAN
        declare -A IMPACTED_PACKAGE_NAMES
        ##########################
        #        Functions       #
        ##########################
        # Function checking if any dependency of a crate will be cleaned
        will_dep_be_cleaned () {
          CRATE=$1
          for dep in $(cargo tree --locked --prefix none --package $CRATE | sed -r 's/^(\S+)\s+v(\S+).*$/\1@\2/' | sort -u); do
            dep_name=${dep%@*}
            if [[ ${IMPACTED_PACKAGE_NAMES[$dep_name]} -eq 1 ]] || [[ ${PACKAGES_TO_CLEAN[$dep_name]} -eq 1 ]]; then
              return 0
            fi
          done
          return 1
        }
        # Function checking if a local package need cleaning
        process_local_crate_cleaning () {
          LOCAL_CRATE_NAME=$1
          current_md5=$2
          if ! previous_md5=$(cat rust_target_md5sum/$LOCAL_CRATE_NAME 2>/dev/null) || [ "$previous_md5" != "$current_md5" ] ; then
            echo previous_md5=$previous_md5 current_md5=$current_md5 =\> Change detected for $LOCAL_CRATE_NAME, cleaning it and updating md5sum
            PACKAGES_TO_CLEAN+=([$LOCAL_CRATE_NAME]=1)
            echo $current_md5 > rust_target_md5sum/$LOCAL_CRATE_NAME
          elif will_dep_be_cleaned $LOCAL_CRATE_NAME ; then
            echo One of $LOCAL_CRATE_NAME dependencies will be cleaned, cleaning it
            PACKAGES_TO_CLEAN+=([$LOCAL_CRATE_NAME]=1)
          fi
        }
        # Function generating the current dependency tree
        dependencies_tree () {
          cargo tree --locked --prefix none --target all -f '{p} feats:{f}' | sed -r 's/^(\S+)\s+v(\S+).* feats:(\S*).*$/\1@\2#\3/' | sort -u
        }
        # Function generating the list of packages that depends on a package
        invert_dependencies_tree () {
          cargo tree --locked --prefix none --target all --invert $1 | sed -r 's/^(\S+)\s+v(\S+).*$/\1@\2/' | sort -u
        }
        # Function systematicly cleaning the files related to a package in the target directory
        manual_clean_package () {
          package_name=$1
          echo "Manually cleaning $package_name"
          find target/ -type d -regextype posix-egrep -regex ".+./\.fingerprint/${package_name}-[a-f0-9]{16}"
          for fg_folder in $(find target/ -type d -regextype posix-egrep -regex ".+./\.fingerprint/${package_name}-[a-f0-9]{16}" -exec basename {} \;) ; do
            fg=${fg_folder: -16}
            # Clean build folders if they exist
            find target/ -type d -regextype posix-egrep -regex ".+/build/${fg_folder}"
            find target/ -type d -regextype posix-egrep -regex ".+/build/${fg_folder}" -exec rm -r {} +
            # Clean deps files if they exist
            dep_name=$(tr '-' '_' <<< "$package_name")
            dep_name="${dep_name}-${fg}"
            find target/ -type f -regextype posix-egrep -regex ".+/deps/(lib)?${dep_name}\..+"
            find target/ -type f -regextype posix-egrep -regex ".+/deps/(lib)?${dep_name}\..+" -exec rm {} +
          done
          find target/ -type d -regextype posix-egrep -regex ".+./\.fingerprint/${package_name}-[a-f0-9]{16}" -exec rm -r {} +
        }
        ##########################
        #     Cache cleaning     #
        ##########################
        if [ -f previous_dependencies_tree ] ; then
          echo Cleaning cached target directory
          declare -A CURRENT_PACKAGES
          echo Building current dependencies tree...
          for p in $(dependencies_tree) ; do
            CURRENT_PACKAGES+=([$p]=1)
          done
          echo Finding all packages that are no longer needed or changed...
          for p in $(cat previous_dependencies_tree) ; do
            if ! [[ ${CURRENT_PACKAGES[$p]} -eq 1 ]]; then
              package_id=${p%#*}
              package_name=${p%@*}
              if cargo pkgid $package_id 2>/dev/null >/dev/null ; then
                echo "Cleaning $package_id and packages depending on it"
                for ptc in $(invert_dependencies_tree $package_id); do
                  ptc_name=${ptc%@*}
                  manual_clean_package "$ptc_name"
                  IMPACTED_PACKAGE_NAMES+=([$ptc_name]=1)
                done
              else
                manual_clean_package "$package_name"
                IMPACTED_PACKAGE_NAMES+=([$package_name]=1)
              fi
            fi
          done
        else
          echo No cached target directory
        fi
        ##########################
        #  Local Crates cleaning #
        ##########################
        if ! [ -d rust_target_md5sum ] ; then mkdir rust_target_md5sum ; fi
        echo Selectively clean-up LAMBDA artifacts if code has changed
        for LAMBDA_FOLDER in $RUST_INTERNAL_LAMBDA_PATH $RUST_CONTENDER_LAMBDA_PATH; do
          for LAMBDA in $(ls $LAMBDA_FOLDER) ; do
            echo Control MD5 for $LAMBDA_FOLDER/$LAMBDA
            cd $LAMBDA_FOLDER/$LAMBDA
            current_md5=$(find . | sort | zip -@ - | md5sum | cut -f1 -d" ")
            cd $CODEBUILD_SRC_DIR
            process_local_crate_cleaning "$LAMBDA" "$current_md5"
          done
        done
        echo Cleaning ${#PACKAGES_TO_CLEAN[@]} packages...
        for package in ${!PACKAGES_TO_CLEAN[@]}; do
          echo Cleaning $package
          cargo clean --locked --target aarch64-unknown-linux-gnu --release --package $package
        done
        ##########################
        #    Dependencies Tree   #
        ##########################
        echo Saving current dependency tree as previous_dependencies_tree
        dependencies_tree > previous_dependencies_tree
      ####################
      # PYTHON PRE-BUILD #
      ####################
      - |
        PYTHON_CONTENDER_LAMBDA_PATH=./contenders/python
    finally:
      - echo Exiting the pre_build phase on `date`
  build:
    on-failure: ABORT
    commands:
      - echo Entered the build phase on `date`
      ##############
      # RUST BUILD #
      ##############
      # Builds every Rust Lambda crate. By project convention, the cargo package
      # name of a contender MUST equal its directory name (the <dev_id>).
      - |
        echo Composing the release build command...
        CMD="cargo lambda build --locked --release --arm64"
        for LAMBDA in $(ls $RUST_INTERNAL_LAMBDA_PATH) ; do
          echo Will build internal Lambda $LAMBDA
          CMD="$CMD --package $LAMBDA"
        done
        if [ -d "$RUST_CONTENDER_LAMBDA_PATH" ]; then
          for LAMBDA in $(ls $RUST_CONTENDER_LAMBDA_PATH) ; do
            echo Will build Rust contender $LAMBDA
            CMD="$CMD --package $LAMBDA"
          done
        fi
        echo $CMD
        eval $CMD
      # Replaces every Lambda directory by a single `bootstrap` file (the compiled
      # binary). CloudFormation's `aws cloudformation package` will then zip that
      # directory and upload it to S3.
      - |
        echo Packaging lambdas...
        for LAMBDA_FOLDER in $RUST_INTERNAL_LAMBDA_PATH $RUST_CONTENDER_LAMBDA_PATH; do
          for LAMBDA in $(ls $LAMBDA_FOLDER) ; do
            echo Prepping: $LAMBDA
            # Remove all content (sources, Cargo.toml, etc.)
            rm -rf $LAMBDA_FOLDER/$LAMBDA/*
            # Move the compiled binary into the Lambda folder
            mv ./target/lambda/$LAMBDA/bootstrap $LAMBDA_FOLDER/$LAMBDA/bootstrap
          done
        done
      ###########
      # C BUILD #
      ###########
      # Builds every C contender Lambda natively on this CodeBuild AL2023
      # aarch64 host. Each contender lives at `contenders/c/<dev_id>/` with a
      # SwiftPM-style layout (Makefile + src/) and links against the AWS
      # Common Runtime (aws-c-s3 + dependencies).
      #
      # The CRT itself is built ONCE into a cache prefix and reused across
      # builds. The cache key is the AWS_CRT_REVS hash (set below); change
      # it to force a rebuild.
      - |
        C_CONTENDER_LAMBDA_PATH=./contenders/c
        if [ -d "$C_CONTENDER_LAMBDA_PATH" ] && [ -n "$(ls $C_CONTENDER_LAMBDA_PATH 2>/dev/null)" ]; then
          set -e
          # Pin CRT library tags. Bump these when upstream releases new versions.
          : "${AWS_C_COMMON_TAG:=v0.14.0}"
          : "${S2N_TLS_TAG:=v1.7.3}"
          : "${AWS_C_CAL_TAG:=v0.9.14}"
          : "${AWS_C_IO_TAG:=v0.26.3}"
          : "${AWS_CHECKSUMS_TAG:=v0.2.10}"
          : "${AWS_C_COMPRESSION_TAG:=v0.3.2}"
          : "${AWS_C_HTTP_TAG:=v0.11.0}"
          : "${AWS_C_SDKUTILS_TAG:=v0.2.4}"
          : "${AWS_C_AUTH_TAG:=v0.10.3}"
          : "${AWS_C_S3_TAG:=v0.12.4}"

          AWS_CRT_REVS="${AWS_C_COMMON_TAG}-${S2N_TLS_TAG}-${AWS_C_CAL_TAG}-${AWS_C_IO_TAG}-${AWS_CHECKSUMS_TAG}-${AWS_C_COMPRESSION_TAG}-${AWS_C_HTTP_TAG}-${AWS_C_SDKUTILS_TAG}-${AWS_C_AUTH_TAG}-${AWS_C_S3_TAG}"
          CRT_PREFIX="$CODEBUILD_SRC_DIR/.crt-cache/install"
          CRT_BUILD_DIR="$CODEBUILD_SRC_DIR/.crt-cache/build"
          CRT_HASH_FILE="$CODEBUILD_SRC_DIR/.crt-cache/revs"

          if [ -f "$CRT_HASH_FILE" ] && [ "$(cat $CRT_HASH_FILE)" = "$AWS_CRT_REVS" ] && [ -d "$CRT_PREFIX/include/aws/s3" ]; then
            echo "AWS CRT cache hit ($AWS_CRT_REVS)"
          else
            echo "AWS CRT cache miss — building from source"
            dnf -y install cmake3 ninja-build openssl-devel
            rm -rf "$CRT_BUILD_DIR" "$CRT_PREFIX"
            mkdir -p "$CRT_BUILD_DIR" "$CRT_PREFIX" "$(dirname $CRT_HASH_FILE)"

            build_crt_lib () {
              REPO=$1; TAG=$2; shift 2
              cd "$CRT_BUILD_DIR"
              if [ ! -d "$(basename $REPO)" ]; then
                git clone --depth 1 --branch "$TAG" "https://github.com/awslabs/$REPO.git"
              fi
              cd "$REPO"
              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="$CRT_PREFIX" \
                -DCMAKE_PREFIX_PATH="$CRT_PREFIX" \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DBUILD_SHARED_LIBS=OFF \
                -DBUILD_TESTING=OFF \
                "$@"
              cmake --build build --target install
              cd "$CODEBUILD_SRC_DIR"
            }

            build_crt_lib aws-c-common      "$AWS_C_COMMON_TAG"
            # s2n-tls lives at aws/s2n-tls (not awslabs)
            cd "$CRT_BUILD_DIR"
            if [ ! -d "s2n-tls" ]; then
              git clone --depth 1 --branch "$S2N_TLS_TAG" https://github.com/aws/s2n-tls.git
            fi
            cd s2n-tls
            cmake -S . -B build -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$CRT_PREFIX" \
              -DCMAKE_PREFIX_PATH="$CRT_PREFIX" \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_TESTING=OFF
            cmake --build build --target install
            cd "$CODEBUILD_SRC_DIR"

            build_crt_lib aws-c-cal         "$AWS_C_CAL_TAG"
            build_crt_lib aws-c-io          "$AWS_C_IO_TAG" -DUSE_S2N=ON
            build_crt_lib aws-checksums     "$AWS_CHECKSUMS_TAG"
            build_crt_lib aws-c-compression "$AWS_C_COMPRESSION_TAG"
            build_crt_lib aws-c-http        "$AWS_C_HTTP_TAG"
            build_crt_lib aws-c-sdkutils    "$AWS_C_SDKUTILS_TAG"
            build_crt_lib aws-c-auth        "$AWS_C_AUTH_TAG"
            build_crt_lib aws-c-s3          "$AWS_C_S3_TAG"

            echo "$AWS_CRT_REVS" > "$CRT_HASH_FILE"
          fi

          export CRT_PREFIX
          for LAMBDA_DIR in "$C_CONTENDER_LAMBDA_PATH"/*/; do
            [ -d "$LAMBDA_DIR" ] || continue
            LAMBDA=$(basename "$LAMBDA_DIR")
            echo "Building C contender $LAMBDA"
            (cd "$LAMBDA_DIR" && make clean && make -j$(nproc))
            BIN="$LAMBDA_DIR/bootstrap"
            if [ ! -f "$BIN" ]; then
              echo "ERROR: C build did not produce $BIN" >&2
              exit 1
            fi
            strip "$BIN" || true
            cp "$BIN" "/tmp/bootstrap-c-$LAMBDA"
            find "$LAMBDA_DIR" -mindepth 1 -delete
            mv "/tmp/bootstrap-c-$LAMBDA" "$LAMBDA_DIR/bootstrap"
            ls -la "$LAMBDA_DIR/bootstrap"
          done
          set +e
        fi

      ############
      # GO BUILD #
      ############
      # Uncomment and adapt this block when adding a Go contender.
      # It assumes contenders live at `contenders/go/<dev_id>/` with a `main.go`
      # (and optional `go.mod`/`go.sum`) at the root of each directory.
      # After building, only the `bootstrap` binary is kept in the source dir
      # so `aws cloudformation package` zips a minimal Lambda artifact.
      #
      # Requirements:
      #   - the CodeBuild image must have a `go` toolchain available.
      #     `aws/codebuild/amazonlinux-aarch64-standard:4.0` (used by this
      #     project) ships Go — verify with `go version` in a build log.
      #   - the contender's CFN block in templates/contenders.yml must use
      #     `Runtime: provided.al2023` (custom runtime executes `bootstrap`).
      #
      # - |
      #   GO_CONTENDER_LAMBDA_PATH=./contenders/go
      #   if [ -d "$GO_CONTENDER_LAMBDA_PATH" ]; then
      #     for LAMBDA in $(ls $GO_CONTENDER_LAMBDA_PATH); do
      #       echo "Building Go contender $LAMBDA"
      #       cd $GO_CONTENDER_LAMBDA_PATH/$LAMBDA
      #       GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap .
      #       cd $CODEBUILD_SRC_DIR
      #       # Strip sources so only the binary ships in the Lambda ZIP
      #       find $GO_CONTENDER_LAMBDA_PATH/$LAMBDA -mindepth 1 -not -name bootstrap -delete
      #     done
      #   fi

      ###############
      # SWIFT BUILD #
      ###############
      # Builds every Swift contender Lambda natively on this CodeBuild
      # AL2023 aarch64 host. The Lambda runtime is also AL2023 aarch64,
      # so we build with `--static-swift-stdlib` and rely on the AL2023
      # base layer providing libFoundation*/libdispatch/etc. at runtime.
      #
      # Convention (mirrors Rust/Go): contenders live at
      # `contenders/swift/<dev_id>/` as standalone SwiftPM packages whose
      # executable product is named `bootstrap`.
      #
      # Cache strategy: tar the .build directory (preserving internal
      # timestamps) keyed on sha256(Package.swift). The install.finally
      # and build.finally phases reset all file mtimes, which breaks
      # SwiftPM's incremental compilation. Restoring from a tar right
      # before `swift build` gives SwiftPM correct timestamps regardless
      # of the touch commands.
      - |
        SWIFT_CONTENDER_LAMBDA_PATH=./contenders/swift
        if [ -d "$SWIFT_CONTENDER_LAMBDA_PATH" ]; then
          SWIFT_CACHE_DIR="$CODEBUILD_SRC_DIR/.swift-build-cache"
          mkdir -p "$SWIFT_CACHE_DIR"
          for LAMBDA_DIR in "$SWIFT_CONTENDER_LAMBDA_PATH"/*/; do
            [ -d "$LAMBDA_DIR" ] || continue
            LAMBDA=$(basename "$LAMBDA_DIR")
            echo "Building Swift contender $LAMBDA"
            cd $SWIFT_CONTENDER_LAMBDA_PATH/$LAMBDA

            # Cache restore: extract .build tar if Package.swift hash matches
            CACHE_TAR="$SWIFT_CACHE_DIR/${LAMBDA}.tar"
            CACHE_HASH_FILE="$SWIFT_CACHE_DIR/${LAMBDA}.package-hash"
            CURRENT_HASH=$(sha256sum Package.swift | cut -d' ' -f1)
            if [ -f "$CACHE_TAR" ] && [ -f "$CACHE_HASH_FILE" ]; then
              PREVIOUS_HASH=$(cat "$CACHE_HASH_FILE")
              if [ "$CURRENT_HASH" = "$PREVIOUS_HASH" ]; then
                echo "Swift cache hit for $LAMBDA (Package.swift unchanged)"
                tar xf "$CACHE_TAR"
              else
                echo "Swift cache miss for $LAMBDA (Package.swift changed)"
              fi
            else
              echo "Swift cache miss for $LAMBDA (no previous cache)"
            fi

            swift build -c release --static-swift-stdlib -Xswiftc -Osize

            # Cache save: tar .build preserving timestamps
            tar cf "$CACHE_TAR" .build
            echo "$CURRENT_HASH" > "$CACHE_HASH_FILE"

            BIN=$(swift build -c release --static-swift-stdlib --show-bin-path)/bootstrap
            if [ ! -f "$BIN" ]; then
              echo "ERROR: Swift build did not produce $BIN" >&2
              exit 1
            fi
            strip "$BIN" || true
            cp "$BIN" /tmp/bootstrap-$LAMBDA
            cd $CODEBUILD_SRC_DIR
            find $SWIFT_CONTENDER_LAMBDA_PATH/$LAMBDA -mindepth 1 -delete
            mv /tmp/bootstrap-$LAMBDA $SWIFT_CONTENDER_LAMBDA_PATH/$LAMBDA/bootstrap
            ls -la $SWIFT_CONTENDER_LAMBDA_PATH/$LAMBDA/bootstrap
          done
        fi

      ################
      # PYTHON BUILD #
      ################
      - |
        if [ -d "$PYTHON_CONTENDER_LAMBDA_PATH" ]; then
          echo Installing dependencies for the Python lambdas
          for LAMBDA in $(ls $PYTHON_CONTENDER_LAMBDA_PATH) ; do
            if [ -f "$PYTHON_CONTENDER_LAMBDA_PATH/$LAMBDA/requirements.txt" ]; then
              echo Installing dependencies for Python lambda: $LAMBDA
              pip install -r $PYTHON_CONTENDER_LAMBDA_PATH/$LAMBDA/requirements.txt -t $PYTHON_CONTENDER_LAMBDA_PATH/$LAMBDA
              rm $PYTHON_CONTENDER_LAMBDA_PATH/$LAMBDA/requirements.txt
            fi
          done
        fi
    finally:
      - |
        echo Changing all file times to 2010-01-01 00:00:00 \(arbitrary\) to avoid inducing changes in ZIP packages
        find . -not -path '*/.git/*' -exec touch -a -m -t"201001010000.00" {} \;
      - echo Exiting the build phase on `date`
  post_build:
    commands:
      - echo Entered the post_build phase on `date`
      - |
        echo Packaging the sub-templates file references...
        # `aws cloudformation package` rewrites local file references inside the template
        # (CodeUri, DefinitionUri, etc.) to S3 URLs after uploading the referenced assets.
        # Note: `ls ./templates/*.yml` returns paths already prefixed with `./templates/`,
        # so we operate on the full path directly.
        for SUBTEMPLATE in ./templates/*.yml ; do
          echo Packaging sub-template $SUBTEMPLATE
          mv $SUBTEMPLATE $SUBTEMPLATE.bak
          aws cloudformation package --template-file $SUBTEMPLATE.bak --s3-bucket $ARTIFACT_BUCKET --s3-prefix templates --output-template-file $SUBTEMPLATE
        done
      - |
        echo Packaging the root-template file references...
        mv root-template.yml root-template.yml.bak
        aws cloudformation package --template-file root-template.yml.bak --s3-bucket $ARTIFACT_BUCKET --s3-prefix templates --output-template-file root-template.yml
    finally:
      - echo Exiting the post_build phase on `date`
artifacts:
  base-directory: .
  files:
    - root-template.yml
cache:
  paths:
    - target/**/* # Rust workspace target directory
    - rust_target_md5sum/**/* # Where we store md5sum for code
    - previous_dependencies_tree # The last seen dependencies tree
    - previous_build_rust_version # The last seen Rust toolchain version
    - .swift-build-cache/**/* # Per-contender .build tars keyed on Package.swift hash
    - .swift-cache/**/* # Swift toolchain tarball cache (~85 MB, saves ~30 s download)
    - .crt-cache/**/* # AWS CRT install prefix + revs marker (~25 MB, saves ~5 min build)
