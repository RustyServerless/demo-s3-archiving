AWSTemplateFormatVersion: 2010-09-09
Description: Root stack of the demo-s3-archiving benchmark. Deployed by the CICD, contains nested stacks.

# Contributors: to add a new contender Lambda, see templates/contenders.yml
# (the "CONTENDERS — REGISTER YOUR LAMBDA HERE" block) and the README.

# Parameters are user-provided inputs injected when the stack is deployed.
# Here, ProjectName is passed through to every nested stack to namespace all resources.
Parameters:
  ProjectName:
    Type: String
  FilesPrefix:
    Type: String
    Default: files
    Description: Key prefix under which the test objects live in the benching bucket

Resources:
  # Each nested stack (AWS::CloudFormation::Stack) deploys a separate template as a child stack.
  # This keeps the infrastructure modular: website, auth, API, and tracing demo are independent units.
  BenchingStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ProjectName: !Ref ProjectName
        FilesPrefix: !Ref FilesPrefix
      # Relative path to the nested template file.
      # `aws cloudformation package` (run during the CI build) uploads it to S3 and rewrites this to an S3 URL.
      TemplateURL: ./templates/benching.yml
      TimeoutInMinutes: 15
      Tags:
        - Key: Project
          Value: !Ref ProjectName
  ContendersStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ProjectName: !Ref ProjectName
        # !GetAtt retrieves an output from an already-deployed nested stack.
        # This also creates an implicit dependency: CognitoStack waits for StaticWebsiteStack to finish.
        BucketName: !GetAtt BenchingStack.Outputs.BucketName
        FilesPrefix: !Ref FilesPrefix
      TemplateURL: ./templates/contenders.yml
      TimeoutInMinutes: 10
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# Outputs expose values from nested stacks so the CI/CD pipeline (and humans) can find them.
Outputs:
  BenchingStateMachineArn:
    Description: ARN of the Step Function that runs the benchmark over a list of contender Lambda ARNs
    Value: !GetAtt BenchingStack.Outputs.BenchingStateMachineArn
  ContenderArns:
    Description: Comma-separated list of registered contender Lambda ARNs (ready to be split into the Step Function input array)
    Value: !GetAtt ContendersStack.Outputs.ContenderArns
