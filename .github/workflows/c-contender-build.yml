name: c-contender-build

on:
  push:
    branches:
      - feat/c-contender
    paths:
      - "contenders/c/**"
      - "ci-config/buildspec.yml"
      - ".github/workflows/c-contender-build.yml"
  pull_request:
    paths:
      - "contenders/c/**"
      - "ci-config/buildspec.yml"
      - ".github/workflows/c-contender-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build C contender on AL2023 aarch64
    runs-on: ubuntu-24.04-arm
    container:
      image: amazonlinux:2023
    steps:
      - name: Install build dependencies
        run: |
          dnf -y install \
            git tar gzip which \
            gcc gcc-c++ make cmake3 ninja-build \
            zlib-devel openssl-devel \
            python3 perl-IPC-Cmd
          ln -sf $(which cmake3 || which cmake) /usr/local/bin/cmake

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache AWS CRT install prefix
        id: crt-cache
        uses: actions/cache@v4
        with:
          path: .crt-cache
          key: crt-al2023-aarch64-${{ hashFiles('.github/workflows/c-contender-build.yml') }}-v1

      - name: Build AWS CRT (if cache miss)
        if: steps.crt-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          export AWS_C_COMMON_TAG=v0.11.7
          export S2N_TLS_TAG=v1.5.13
          export AWS_C_CAL_TAG=v0.8.5
          export AWS_C_IO_TAG=v0.16.4
          export AWS_CHECKSUMS_TAG=v0.2.3
          export AWS_C_COMPRESSION_TAG=v0.3.1
          export AWS_C_HTTP_TAG=v0.9.2
          export AWS_C_SDKUTILS_TAG=v0.2.3
          export AWS_C_AUTH_TAG=v0.8.4
          export AWS_C_S3_TAG=v0.7.7

          PREFIX="$PWD/.crt-cache/install"
          BUILD_DIR="$PWD/.crt-cache/build"
          mkdir -p "$PREFIX" "$BUILD_DIR"

          build_lib () {
            local org=$1 repo=$2 tag=$3; shift 3
            cd "$BUILD_DIR"
            if [ ! -d "$repo" ]; then
              git clone --depth 1 --branch "$tag" "https://github.com/$org/$repo.git"
            fi
            cd "$repo"
            cmake -S . -B build -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$PREFIX" \
              -DCMAKE_PREFIX_PATH="$PREFIX" \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_TESTING=OFF \
              "$@"
            cmake --build build --target install
            cd "$GITHUB_WORKSPACE"
          }

          build_lib awslabs aws-c-common      "$AWS_C_COMMON_TAG"
          build_lib aws     s2n-tls           "$S2N_TLS_TAG"
          build_lib awslabs aws-c-cal         "$AWS_C_CAL_TAG"
          build_lib awslabs aws-c-io          "$AWS_C_IO_TAG" -DUSE_S2N=ON
          build_lib awslabs aws-checksums     "$AWS_CHECKSUMS_TAG"
          build_lib awslabs aws-c-compression "$AWS_C_COMPRESSION_TAG"
          build_lib awslabs aws-c-http        "$AWS_C_HTTP_TAG"
          build_lib awslabs aws-c-sdkutils    "$AWS_C_SDKUTILS_TAG"
          build_lib awslabs aws-c-auth        "$AWS_C_AUTH_TAG"
          build_lib awslabs aws-c-s3          "$AWS_C_S3_TAG"

      - name: Build C contender
        env:
          CRT_PREFIX: ${{ github.workspace }}/.crt-cache/install
        run: |
          cd contenders/c/sebsto
          make -j$(nproc)
          file ./bootstrap
          ls -la ./bootstrap

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap
          path: contenders/c/sebsto/bootstrap
          if-no-files-found: error
